name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build linux/amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o watchdiff-linux-amd64 .

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o watchdiff-darwin-amd64 .

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o watchdiff-darwin-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            watchdiff-linux-amd64
            watchdiff-darwin-amd64
            watchdiff-darwin-arm64
